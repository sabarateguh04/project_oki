<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Master Customer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="content">

<nav class="navbar navbar-expand-lg bg-white shadow-sm">

<div class="container-fluid">

<h4>Master Customer</h4>

<div>

<b id="username"></b>

</div>

</div>

</nav>

<div class="container-fluid mt-4">

<div class="card shadow-sm">

<div class="card-header d-flex justify-content-between align-items-center">

<h5 class="mb-0">

Data Customer

</h5>

<button
class="btn btn-primary"
data-bs-toggle="modal"
data-bs-target="#modalCustomer">

<i class="bi bi-plus-circle"></i>

Tambah Customer

</button>

</div>

<div class="card-body">

<div class="row mb-3">

<div class="col-md-4">

<input
id="searchCustomer"
class="form-control"
placeholder="Cari Customer..."
onkeyup="searchTable('searchCustomer','customerTable')">

</div>

</div>

<div class="table-responsive">

<table
class="table table-hover"
id="customerTable">

<thead class="table-light">

<tr>

<th>No</th>

<th>Nama Customer</th>

<th>PIC</th>

<th>Telepon</th>

<th>Email</th>

<th>Status</th>

<th width="170">

Aksi

</th>

</tr>

</thead>

<tbody>

<tr>

<td>1</td>

<td>PT ABC Indonesia</td>

<td>Budi</td>

<td>081234567890</td>

<td>abc@email.com</td>

<td>

<span class="badge bg-success">

Aktif

</span>

</td>

<td>

<button class="btn btn-warning btn-sm">

<i class="bi bi-pencil"></i>

</button>

<button
onclick="deleteRow(this)"
class="btn btn-danger btn-sm">

<i class="bi bi-trash"></i>

</button>

</td>

</tr>

<tr>

<td>2</td>

<td>PT XYZ</td>

<td>Joko</td>

<td>081333333333</td>

<td>xyz@email.com</td>

<td>

<span class="badge bg-success">

Aktif

</span>

</td>

<td>

<button class="btn btn-warning btn-sm">

<i class="bi bi-pencil"></i>

</button>

<button
onclick="deleteRow(this)"
class="btn btn-danger btn-sm">

<i class="bi bi-trash"></i>

</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<div
class="modal fade"
id="modalCustomer">

<div class="modal-dialog modal-lg">

<div class="modal-content">

<div class="modal-header">

<h5>Tambah Customer</h5>

<button
class="btn-close"
data-bs-dismiss="modal">

</button>

</div>

<div class="modal-body">

<div class="row">

<div class="col-md-6 mb-3">

<label>Nama Customer</label>

<input
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>PIC</label>

<input
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>No HP</label>

<input
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Status</label>

<select class="form-select">

<option>Aktif</option>

<option>Non Aktif</option>

</select>

</div>

<div class="col-12">

<label>Alamat</label>

<textarea
rows="3"
class="form-control"></textarea>

</div>

</div>

</div>

<div class="modal-footer">

<button
class="btn btn-secondary"
data-bs-dismiss="modal">

Batal

</button>

<button
class="btn btn-primary"
onclick="toast('Customer berhasil disimpan')">

Simpan

</button>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/app.js"></script>

<script>

renderSidebar("customer");

</script>

</body>

</html>
