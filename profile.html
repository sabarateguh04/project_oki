<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Profil - Maintenance System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="content">

<nav class="navbar navbar-expand-lg bg-white shadow-sm">
<div class="container-fluid">
<h4 class="mb-0">Profil Saya</h4>
<div class="d-flex align-items-center">
<span id="roleBadge" class="me-3"></span>
<i class="bi bi-person-circle fs-4 me-2 text-primary"></i>
<b id="username"></b>
</div>
</div>
</nav>

<div class="container-fluid mt-4">
<div class="row">

<div class="col-lg-4">
<div class="card shadow-sm">
<div class="card-body text-center">
<img id="avatarImg" src="" class="rounded-circle mb-3" width="140">
<h4 id="profileName"></h4>
<p class="text-muted mb-1" id="profileTitle"></p>
<span class="badge bg-success">Aktif</span>
<hr>
<div class="d-grid">
<button class="btn btn-primary" onclick="toast('Fitur ganti foto (dummy)')">
<i class="bi bi-camera"></i> Ganti Foto
</button>
</div>
</div>
</div>
</div>

<div class="col-lg-8">

<div class="card shadow-sm mb-4">
<div class="card-header">Informasi Akun</div>
<div class="card-body">
<div class="row">

<div class="col-md-6 mb-3">
<label>Nama Lengkap</label>
<input class="form-control" id="inputNama">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input class="form-control" id="inputEmail">
</div>

<div class="col-md-6 mb-3">
<label>No HP</label>
<input class="form-control" value="0812-3456-7890">
</div>

<div class="col-md-6 mb-3">
<label>Role</label>
<input class="form-control" id="inputRole" readonly>
</div>

</div>

<div class="text-end mt-3">
<button class="btn btn-primary" onclick="toast('Profil berhasil diperbarui')">
<i class="bi bi-check-circle"></i> Simpan Profil
</button>
</div>
</div>
</div>

<div class="card shadow-sm">
<div class="card-header">Ubah Password</div>
<div class="card-body">
<div class="mb-3">
<label>Password Lama</label>
<input type="password" class="form-control">
</div>
<div class="mb-3">
<label>Password Baru</label>
<input type="password" class="form-control">
</div>
<div class="mb-3">
<label>Konfirmasi Password</label>
<input type="password" class="form-control">
</div>
<div class="text-end">
<button class="btn btn-success" onclick="toast('Password berhasil diperbarui')">
<i class="bi bi-check-circle"></i> Simpan Perubahan
</button>
</div>
</div>
</div>

</div>
</div>
</div>

</div>
</div>

<script src="js/app.js"></script>
<script>

renderSidebar("profile");

const role = currentRole();
const profile = ROLE_PROFILE[role];

document.getElementById("profileName").innerText = profile.name;
document.getElementById("profileTitle").innerText = profile.title;
document.getElementById("inputNama").value = profile.name;
document.getElementById("inputRole").value = profile.title;
document.getElementById("inputEmail").value = profile.name.toLowerCase().replace(/\s+/g,".") + "@estrada.co.id";
document.getElementById("avatarImg").src = "https://ui-avatars.com/api/?name=" + encodeURIComponent(profile.name) + "&background=0d6efd&color=fff&size=200";

</script>

</body>
</html>
